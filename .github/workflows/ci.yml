# CI seed (feat/scaffold): verify on every push/PR; deploy main to GitHub Pages.
# feat/cicd-pipeline replaces the single deploy with the test→staging→prod
# promotion pipeline (build-once-promote, smoke gates between environments).
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# The deploy job pushes to the gh-pages branch; the default GITHUB_TOKEN is
# read-only unless widened here.
permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy:
    # Placeholder single-environment deploy; becomes the 3-env promotion in
    # feat/cicd-pipeline.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-deploy # serialize all pushes to the gh-pages branch
      cancel-in-progress: false
    environment:
      name: production
      url: https://itsord.github.io/fah-thai/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
